<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Email Verification</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f7f9fa;
            color: #222;
            margin: 0;
            padding: 0;
        }
        .container {
            background: #fff;
            max-width: 520px;
            margin: 40px auto;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 36px 24px 36px;
        }
        h2 {
            color: #1a73e8;
            margin-bottom: 8px;
            text-align: center;
        }
        .button {
            display: inline-block;
            margin: 18px 0 6px 0;
            background: #1a73e8;
            color: #fff !important;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
        }
        .note {
            color: #666;
            font-size: 0.95em;
        }
        .footer {
            margin-top: 32px;
            border-top: 1px solid #eaeaea;
            padding-top: 18px;
            font-size: 0.95em;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Verify your email</h2>
    <p>Hello, <span>${email}</span></p>
    <p>Please confirm your email address to activate your NukkadSeva account.</p>
    <p><a class="button" href="${verificationLink}">Verify Email</a></p>
    <p class="note">If the button does not work, copy and paste this link into your browser:</p>
    <p><a href="${verificationLink}">${verificationLink}</a></p>
    <div class="footer">
        <div>Team NukkadSeva</div>
        <div>&copy; 2024 NukkadSeva. All rights reserved.</div>
    </div>
</div>
</body>
</html>
