# =============================================
# PROD Profile — Production Deployment
# =============================================

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    open-in-view: false

# Azure Blob storage in production
storage:
  type: azure

# Swagger disabled in production
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Minimal logging in production
logging:
  level:
    root: DEBUG
    com.nukkadseva: DEBUG
    org.springframework: DEBUG

# Cookie: HTTPS only, cross-site support
app:
  cookie:
    secure: true
    same-site: none
